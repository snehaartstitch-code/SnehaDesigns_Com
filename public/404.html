<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sneha Designs</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect trick
      // Redirects 404s back to index.html with the path encoded in the query string
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
