<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sneha Designs</title>
    <script type="text/javascript">
      // Standard spa-github-pages redirect (https://github.com/rafgraph/spa-github-pages)
      // pathSegmentsToKeep = 0 for custom domain at root
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
